<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A4 Builder PRO PDF</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:Arial;
    background:#eee;
    padding:10px;
}

.topbar{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:10px;
}

button{
    padding:10px 14px;
    font-size:15px;
    cursor:pointer;
}

/* A4 PAGE */
#page{
    width:210mm;
    min-height:297mm;
    background:white;
    margin:auto;
    padding:8mm;
    border:1px solid #ccc;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:4mm;
}

.cell{
    border:1px solid black;
    padding:3mm;
    display:flex;
    flex-direction:column;
}

.dropzone{
    width:100%;
    border:1px dashed #999;
    overflow:hidden;
    background:#f8f8f8;
}

.landscape{ aspect-ratio:4/3; }
.portrait{ aspect-ratio:3/4; }

.dropzone img{
    width:100%;
    height:100%;
    object-fit:contain;
}

.caption{
    text-align:center;
    font-weight:bold;
    font-size:12px;
    margin-top:2mm;
    min-height:14px;
}

.controls{
    margin-top:2mm;
}

.controls input{
    width:100%;
    margin-top:2mm;
    padding:4px;
}

.orient{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:2mm;
    font-size:12px;
}

/* Responsive */
@media(max-width:900px){
    #page{ width:95%; }
    .grid{ grid-template-columns:repeat(2,1fr); }
}

@media(max-width:600px){
    .grid{ grid-template-columns:1fr; }
}

@media print{
    .topbar{ display:none; }
}
</style>
</head>

<body>

<div class="topbar">
    <button onclick="location.reload()">Reset</button>
    <button onclick="printPage()">Drucken</button>
    <button onclick="exportPDF()">📄 PDF erstellen</button>
</div>

<div id="page">
    <div class="grid" id="grid"></div>
</div>

<script>

const grid=document.getElementById("grid");

for(let i=1;i<=12;i++){

    const cell=document.createElement("div");
    cell.className="cell";

    cell.innerHTML=`
        <div class="dropzone landscape" id="dz${i}">
            <img id="img${i}">
        </div>

        <div class="caption" id="cap${i}"></div>

        <div class="controls">

            <input type="file" accept="image/*"
                onchange="loadImg(event,${i})">

            <input type="text"
                placeholder="Text"
                oninput="setText(${i},this.value)">

            <div class="orient">
                <label><input type="radio" name="o${i}" checked onchange="setOri(${i},'landscape')">Quer</label>
                <label><input type="radio" name="o${i}" onchange="setOri(${i},'portrait')">Hoch</label>
            </div>

        </div>
    `;

    grid.appendChild(cell);
}

/* IMAGE */
function loadImg(e,id){
    const file=e.target.files[0];
    if(!file) return;

    const reader=new FileReader();
    reader.onload=ev=>{
        document.getElementById("img"+id).src=ev.target.result;
    };
    reader.readAsDataURL(file);
}

/* TEXT */
function setText(id,t){
    document.getElementById("cap"+id).textContent=t;
}

/* ORIENTATION */
function setOri(id,mode){
    const el=document.getElementById("dz"+id);
    el.classList.remove("landscape","portrait");
    el.classList.add(mode);
}

/* PRINT */
function printPage(){
    window.print();
}

/* =========================
   PDF EXPORT FIXED
   ========================= */
async function exportPDF(){

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p","mm","a4");

    const page = document.getElementById("page");

    // wichtig: Bilder vollständig laden
    await new Promise(r => setTimeout(r, 300));

    const canvas = await html2canvas(page, {
        scale:2,
        useCORS:true,
        allowTaint:true
    });

    const imgData = canvas.toDataURL("image/png");

    const pdfWidth = 210;
    const pdfHeight = (canvas.height * pdfWidth) / canvas.width;

    pdf.addImage(imgData,"PNG",0,0,pdfWidth,pdfHeight);
    pdf.save("a4-layout.pdf");
}

</script>

</body>
</html>
